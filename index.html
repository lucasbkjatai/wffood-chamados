<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WFFOOD — Sistema de Chamados</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
:root{
  --red:#e53935;--red-dark:#c62828;--red-light:#ffebee;
  --sidebar:#1a1a1a;--bg:#f0f2f5;--white:#fff;
  --border:#e0e0e0;--border2:#f0f0f0;
  --text:#1a1a1a;--text2:#757575;--text3:#9e9e9e;
  --green:#2e7d32;--green-bg:#e8f5e9;--green-bd:#c8e6c9;
  --blue:#1565c0;--blue-bg:#e3f2fd;--blue-bd:#bbdefb;
  --purple:#6a1b9a;--purple-bg:#f3e5f5;
  --orange:#e65100;--orange-bg:#fff3e0;--orange-bd:#ffe0b2;
  --yellow-bg:#fffde7;--yellow-bd:#fff176;
  --shadow:0 1px 4px rgba(0,0,0,0.08);
  --shadow2:0 4px 16px rgba(0,0,0,0.1);
}
body{background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ===== LOGIN ===== */
#login-screen{
  min-height:100vh;background:#1e1e1e;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;
}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{color:#fff;font-size:40px;font-weight:900;letter-spacing:-2px}
.login-logo h1 span{color:var(--red)}
.login-logo p{color:rgba(255,255,255,0.3);font-size:12px;margin-top:6px;letter-spacing:1px;text-transform:uppercase}
.login-card{background:var(--red);border-radius:16px;padding:32px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(229,57,53,0.35)}
.lbl{display:flex;justify-content:space-between;align-items:center;color:rgba(255,255,255,0.9);font-size:12px;font-weight:600;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px}
.lbl a{color:rgba(255,255,255,0.6);font-size:11px;cursor:pointer;text-decoration:underline;text-transform:none;font-weight:400}
.inp{width:100%;padding:12px 14px;border-radius:8px;border:2px solid transparent;font-size:14px;margin-bottom:16px;background:#fff;color:#333;outline:none;transition:border-color .2s}
.inp:focus{border-color:rgba(255,255,255,0.5)}
.chk-row{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.chk-row input{width:15px;height:15px;accent-color:#1a1a1a;cursor:pointer}
.chk-row span{color:rgba(255,255,255,0.85);font-size:13px;cursor:pointer}
.login-btn{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:background .2s}
.login-btn:hover{background:#333}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{background:rgba(0,0,0,.25);color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;display:none;border-left:3px solid rgba(255,255,255,.5)}

/* ===== LAYOUT ===== */
#app{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh}

/* ===== SIDEBAR ===== */
.sidebar{
  width:220px;min-width:220px;background:var(--sidebar);
  display:flex;flex-direction:column;transition:width .25s ease;flex-shrink:0
}
.sidebar.col{width:58px;min-width:58px}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand-inner{display:flex;align-items:center;gap:10px}
.sb-logo{width:36px;height:36px;min-width:36px;background:var(--red);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0}
.sb-txt .sb-name{color:#fff;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden}
.sb-txt .sb-sub{color:rgba(255,255,255,.3);font-size:10px;white-space:nowrap;margin-top:1px;text-transform:uppercase;letter-spacing:.5px}
.sb-nav{flex:1;padding:10px 0;overflow:hidden}
.nav-it{
  display:flex;align-items:center;gap:10px;padding:11px 16px;
  cursor:pointer;color:rgba(255,255,255,.45);font-size:13px;
  border-left:3px solid transparent;transition:all .15s;white-space:nowrap;overflow:hidden
}
.nav-it:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
.nav-it.on{color:#fff;background:rgba(229,57,53,.15);border-left-color:var(--red)}
.nav-ico{font-size:18px;flex-shrink:0;width:22px;text-align:center}
.nav-lbl{overflow:hidden;text-overflow:ellipsis;font-weight:500}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sb-foot-btn{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.25);font-size:11px;cursor:pointer;white-space:nowrap}
.sb-foot-btn:hover{color:rgba(255,255,255,.5)}

/* ===== TOPBAR ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  height:54px;padding:0 24px;background:var(--white);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;box-shadow:var(--shadow)
}
.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.bc a{color:var(--text2);cursor:pointer;text-decoration:none;font-weight:500}
.bc a:hover{color:var(--text);text-decoration:underline}
.bc-sep{color:var(--text3)}
.topbar-r{display:flex;align-items:center;gap:14px;position:relative}
.tb-client{text-align:right}
.tb-client .lbl-c{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.tb-client .name-c{font-size:12px;font-weight:700;color:var(--text)}
.uav{
  width:36px;height:36px;background:var(--red);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;
  border:2px solid transparent;transition:border-color .15s;user-select:none
}
.uav:hover{border-color:rgba(229,57,53,.5)}
.dropdown{
  position:absolute;top:44px;right:0;
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:6px 0;width:240px;
  z-index:300;box-shadow:var(--shadow2);display:none
}
.dropdown.open{display:block}
.dd-hd{padding:12px 16px 10px;border-bottom:1px solid var(--border2)}
.dd-nm{font-size:13px;font-weight:700}
.dd-em{font-size:11px;color:var(--text2);margin-top:2px}
.dd-it{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;transition:background .1s;color:var(--text);font-weight:500}
.dd-it:hover{background:#f5f5f5}
.dd-sep{height:1px;background:var(--border2);margin:4px 0}
.dd-danger{color:var(--red)!important}

/* ===== PAGE ===== */
.page{flex:1;overflow-y:auto;padding:24px}
.pg-title{font-size:20px;font-weight:800;margin-bottom:20px;color:var(--text)}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:8px;border:1px solid var(--border);
  background:var(--white);cursor:pointer;font-size:13px;color:var(--text);
  transition:all .15s;font-family:inherit;font-weight:600;white-space:nowrap
}
.btn:hover{background:#f5f5f5;border-color:#ccc}
.btn-primary{background:var(--red);color:#fff;border-color:var(--red)}
.btn-primary:hover{background:var(--red-dark);border-color:var(--red-dark)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn:disabled{opacity:.6;cursor:not-allowed}

/* ===== CARD ===== */
.card{background:var(--white);border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow)}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;white-space:nowrap}
.bw{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.ba{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.bf{background:#f5f5f5;color:#666;border:1px solid #e0e0e0}
.bl{background:#f9fbe7;color:#827717;border:1px solid #dce775}
.bm{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.bh{background:var(--red-light);color:var(--red-dark);border:1px solid #ef9a9a}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dg{background:#43a047}.db{background:#1e88e5}.dgr{background:#9e9e9e}

/* ===== HOME ===== */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.stat-card{
  background:var(--white);border-radius:12px;padding:20px;
  border:1px solid var(--border);box-shadow:var(--shadow)
}
.stat-n{font-size:36px;font-weight:900;line-height:1.1;margin-bottom:6px}
.stat-l{font-size:12px;color:var(--text2);font-weight:500}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border2);font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.card-bd{padding:16px 18px}
.rec-it{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2)}
.rec-it:last-child{border:none}
.rec-lnk{font-size:12px;font-weight:700;cursor:pointer;color:var(--text);text-decoration:none}
.rec-lnk:hover{color:var(--red);text-decoration:underline}
.rec-dt{font-size:10px;color:var(--text3);margin-top:2px}
.qbtn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-radius:9px;border:1px solid var(--border);
  background:var(--white);cursor:pointer;font-size:13px;font-weight:600;
  margin-bottom:8px;transition:all .15s;font-family:inherit
}
.qbtn:hover{border-color:var(--red);background:var(--red-light);color:var(--red-dark)}
.qbtn:last-child{margin-bottom:0}
.qdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ===== FORMULÁRIOS ===== */
.cat-list{display:flex;flex-direction:column;gap:10px}
.cat-card{
  background:var(--white);border:1px solid var(--border);border-radius:12px;
  padding:20px;cursor:pointer;display:flex;align-items:center;gap:16px;
  transition:all .15s;box-shadow:var(--shadow)
}
.cat-card:hover{border-color:var(--red);box-shadow:0 4px 16px rgba(229,57,53,.12);transform:translateY(-1px)}
.cat-ico{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.ci-e{background:var(--blue-bg);color:var(--blue)}
.ci-q{background:var(--green-bg);color:var(--green)}
.ci-t{background:var(--purple-bg);color:var(--purple)}
.cat-name{font-size:15px;font-weight:700;margin-bottom:3px}
.cat-desc{font-size:12px;color:var(--text2)}

/* ===== FORM CHAMADO ===== */
.form-card{background:var(--white);border:1px solid var(--border);border-radius:12px;max-width:680px;box-shadow:var(--shadow)}
.form-tabs{background:#f8f8f8;padding:0 20px;border-bottom:1px solid var(--border);border-radius:12px 12px 0 0}
.form-tab{display:inline-block;padding:12px 0;font-size:13px;font-weight:700;color:var(--red);border-bottom:3px solid var(--red)}
.form-bd{padding:28px}
.fg{margin-bottom:22px}
.fl{display:block;font-size:11px;font-weight:700;margin-bottom:8px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.fl .req{color:var(--red)}
.fhint{font-size:11px;color:var(--text3);margin-bottom:7px}
.finp{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;
  font-size:13px;outline:none;font-family:inherit;background:#fafafa;color:var(--text);transition:border-color .2s
}
.finp:focus{border-color:var(--red);background:#fff}
.fsel{
  padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;
  font-size:13px;background:#fafafa;cursor:pointer;outline:none;font-family:inherit;transition:border-color .2s
}
.fsel:focus{border-color:var(--red)}
.fta{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;
  font-size:13px;resize:vertical;min-height:110px;outline:none;font-family:inherit;
  background:#fafafa;color:var(--text);transition:border-color .2s
}
.fta:focus{border-color:var(--red)}
.upzone{
  border:2px dashed var(--border);border-radius:10px;padding:22px;text-align:center;
  background:#fafafa;transition:all .2s;cursor:pointer
}
.upzone:hover,.upzone.drag{border-color:var(--red);background:var(--red-light)}
.upzone p{font-size:12px;color:var(--text2);margin-bottom:10px}
.upzone-btns{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap}
.file-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.prev-img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border)}
.prev-file{padding:6px 12px;background:#f5f5f5;border-radius:7px;font-size:11px;border:1px solid var(--border);color:var(--text2)}
.form-footer{text-align:center;padding-top:8px;border-top:1px solid var(--border2)}

.success-box{text-align:center;padding:36px 20px}
.suc-ico{width:64px;height:64px;background:#43a047;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px;color:#fff}
.suc-title{font-size:20px;font-weight:800;color:#1b5e20;margin-bottom:8px}
.suc-sub{font-size:13px;color:#388e3c;margin-bottom:22px}
.suc-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ===== CHAMADOS TABLE ===== */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fsel-sm{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--white);cursor:pointer;font-family:inherit;font-weight:500}
.tbl-wrap{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  background:#f8f8f8;padding:11px 14px;text-align:left;
  font-weight:700;font-size:11px;color:var(--text2);
  border-bottom:1px solid var(--border);white-space:nowrap;
  text-transform:uppercase;letter-spacing:.4px
}
tbody td{padding:13px 14px;border-bottom:1px solid var(--border2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr.cr:hover td{background:#fafafa;cursor:pointer}
.tlink{color:var(--text);font-weight:700;cursor:pointer}
.tlink:hover{color:var(--red);text-decoration:underline}
.tbl-empty{padding:56px;text-align:center;color:var(--text2);font-size:13px}

/* ===== TICKET DETAIL ===== */
.det-layout{display:flex;height:100%;overflow:hidden}
.det-main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.det-hd{
  padding:14px 20px;background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0
}
.det-title{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.det-body{flex:1;display:flex;overflow:hidden;min-height:0}
.det-tabs{
  width:155px;min-width:155px;border-right:1px solid var(--border);
  background:#fafafa;padding:10px 8px;flex-shrink:0
}
.dt-it{
  padding:9px 10px;border-radius:7px;font-size:12px;cursor:pointer;
  color:var(--text2);display:flex;align-items:center;justify-content:space-between;
  margin-bottom:3px;transition:background .1s;font-weight:500
}
.dt-it:hover{background:#f0f0f0}
.dt-it.act{background:var(--white);color:var(--text);font-weight:700;box-shadow:var(--shadow)}
.dt-cnt{background:var(--red);color:#fff;font-size:10px;padding:2px 7px;border-radius:100px}
.msgs-wrap{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
.msg{border-radius:10px;padding:14px 16px}
.msg-form{background:var(--green-bg);border:1px solid var(--green-bd)}
.msg-auto{background:var(--yellow-bg);border:1px solid #fff176}
.msg-user{background:var(--white);border:1px solid var(--border);box-shadow:var(--shadow)}
.msg-meta{font-size:11px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.msg-txt{font-size:13px;line-height:1.65;color:var(--text)}
.msg-imgs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.msg-imgs img{height:100px;max-width:160px;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid var(--border);transition:opacity .15s}
.msg-imgs img:hover{opacity:.85}
.reply-bar{
  padding:12px 20px;background:var(--white);border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center;flex-shrink:0
}
.reply-inp{
  flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;
  font-size:13px;outline:none;font-family:inherit;transition:border-color .2s
}
.reply-inp:focus{border-color:var(--red)}
.det-side{
  width:265px;min-width:265px;border-left:1px solid var(--border);
  overflow-y:auto;background:var(--white);flex-shrink:0
}
.ds-sec{padding:16px;border-bottom:1px solid var(--border2)}
.ds-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.ds-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border2);gap:8px}
.ds-row:last-child{border:none}
.ds-lbl{font-size:11px;color:var(--text2);flex-shrink:0}
.ds-val{font-size:11px;font-weight:600;text-align:right;word-break:break-word;color:var(--text)}
.actor-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.actor-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}

/* ===== STATS TAB ===== */
.stats-body{padding:20px;overflow-y:auto}
.tl{display:flex;flex-direction:column;gap:0;position:relative;padding-left:40px;margin-bottom:24px}
.tl::before{content:'';position:absolute;left:13px;top:14px;bottom:14px;width:1px;background:var(--border)}
.tl-it{display:flex;align-items:flex-start;gap:12px;padding:6px 0;position:relative}
.tl-dot{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--border);
  background:var(--white);display:flex;align-items:center;justify-content:center;
  font-size:11px;flex-shrink:0;position:absolute;left:-40px
}
.tl-dot.done{background:#43a047;border-color:#43a047;color:#fff}
.tl-dot.now{background:var(--blue);border-color:var(--blue);color:#fff}
.tl-lbl{font-size:13px;font-weight:600}
.tl-sub{font-size:11px;color:var(--text2);margin-top:2px}
.stats-nums{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.snum{background:#f8f8f8;border-radius:8px;padding:12px;border:1px solid var(--border)}
.snum-v{font-size:20px;font-weight:800}
.snum-l{font-size:11px;color:var(--text2);margin-top:3px}

/* ===== ADMIN ===== */
.adm-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
.adm-hd{padding:14px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.adm-title{font-size:14px;font-weight:700}
.adm-body{padding:0 20px}
.usr-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border2)}
.usr-row:last-child{border:none}
.usr-info{flex:1;min-width:0}
.usr-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.usr-email{font-size:11px;color:var(--text2)}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:16px;padding:28px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.15)}
.modal-title{font-size:17px;font-weight:800;margin-bottom:22px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--border2)}

/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:24px;right:24px;
  background:#1a1a1a;color:#fff;padding:12px 18px;
  border-radius:10px;font-size:13px;font-weight:600;
  z-index:9999;transition:all .3s;opacity:0;transform:translateY(8px);
  pointer-events:none;max-width:340px
}
#toast.show{opacity:1;transform:translateY(0)}

function catLbl(c){

function lojaStr(id){

}
function fdt(d){
  if(!d)return'—';
  const dt=new Date(d);
  return dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function sbadge(s){
  if(s==='aguardando')return`<span class="badge bw"><span class="dot dg"></span> Aguardando atendimento</span>`;
  if(s==='em_atendimento')return`<span class="badge ba"><span class="dot db"></span> Em atendimento</span>`;
  return`<span class="badge bf"><span class="dot dgr"></span> Fechado</span>`;
}
function pbadge(p){
  if(p==='alta')return`<span class="badge bh">Alta</span>`;
  if(p==='media')return`<span class="badge bm">Média</span>`;
  return`<span class="badge bl">Baixa</span>`;
}
function toast(m,t=''){

/* ── FORM CHAMADO ── */
function renderFormChamado(pg,cat){

    :`<select class="fsel" id="floja" style="width:100%"><option value="">Selecione a loja...</option>${lOpts}</select>`;

    <div class="form-tabs"><span class="form-tab">Chamado</span></div>

        <label class="fl">Descrição do chamado <span class="req">*</span></label>

      <div class="fg">

        </select>
      </div>

        <input type="text" class="finp" id="fext" placeholder="Opcional — número no sistema do fornecedor" />
      </div>
      <div class="fg">
        <label class="fl">Número de telefone <span class="req">*</span></label>
        <div class="fhint">Formato: DDD 9XXXX-XXXX</div>
        <input type="tel" class="finp" id="ftel" placeholder="Ex: 65 99999-9999" />
      </div>
      <div class="fg">
        <label class="fl">Foto / Vídeo do problema</label>
        <div class="upzone" id="upz"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="handleDrop(event)">
          <p>📎 Arraste fotos ou vídeos aqui, ou</p>
          <div class="upzone-btns">
            <button class="btn btn-sm" type="button" onclick="document.getElementById('ffile').click()">Escolher arquivos</button>

        </div>
        <div class="file-preview" id="fprev"></div>
      </div>
      <div class="form-footer">
        <button class="btn btn-primary" id="fsubmit" onclick="submitChamado('${cat}')">✉️ Enviar chamado</button>
      </div>
    </div>
  </div>`;
}

function onFiles(inp){
  _droppedFiles=null;
  onFilesRaw(inp.files);
}
let _droppedFiles=null;
function handleDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag');
  _droppedFiles=e.dataTransfer.files;
  const inp=document.getElementById('ffile');
  onFilesRaw(_droppedFiles);
}
function onFilesRaw(files){
  const names=Array.from(files).map(f=>f.name).join(', ');
  const el=document.getElementById('ffname');if(el)el.textContent=names||'Nenhum arquivo';
  const prev=document.getElementById('fprev');if(prev)prev.innerHTML='';
  Array.from(files).forEach(f=>{
    if(f.type.startsWith('image/')){
      const r=new FileReader();
      r.onload=e=>{if(prev)prev.innerHTML+=`<img src="${e.target.result}" class="prev-img" alt="preview">`;};
      r.readAsDataURL(f);
    } else {if(prev)prev.innerHTML+=`<div class="prev-file">📄 ${f.name}</div>`;}
  });
}

async function submitChamado(cat){
  const loja_id=document.getElementById('floja').value;
  const desc=document.getElementById('fdesc').value.trim();
  const tel=document.getElementById('ftel').value.trim();
  const prio=document.getElementById('fprio').value;
  if(!loja_id){toast('⚠️ Selecione a loja!','err');return;}
  if(!desc){toast('⚠️ Descreva o problema!','err');return;}
  if(!tel){toast('⚠️ Informe o telefone!','err');return;}
  const btn=document.getElementById('fsubmit');
  btn.textContent='Enviando...';btn.disabled=true;
  const loja=LOJAS.find(l=>l.id===loja_id);
  const titulo=`${catLbl(cat)} — ${loja?.codigo||''}`;

function renderMsgTab(cid){
  return`<div class="msgs-wrap" id="msgsarea">${_MSGS.map(m=>renderMsg(m)).join('')}</div>
  <div class="reply-bar">
    <input type="text" class="reply-inp" id="replyin" placeholder="Escreva uma mensagem..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){sendMsg(${cid});event.preventDefault()}" />
    <label class="btn btn-sm" for="replyfile" title="Anexar foto" style="cursor:pointer">📎</label>
    <input type="file" id="replyfile" accept="image/*" style="display:none" onchange="sendImgMsg(${cid},this)" />
    <button class="btn btn-primary btn-sm" onclick="sendMsg(${cid})">✉️ Enviar</button>
  </div>`;
}

function renderMsg(m){
  const isForm=m.conteudo.startsWith('📋');
  const isAuto=m.conteudo.startsWith('✅');
  const cls=isForm?'msg-form':isAuto?'msg-auto':'msg-user';
  const who=isAuto?'🤖 Sistema automático':(m.autor_nome||(m.autor_email?m.autor_email.split('@')[0]:null)||PROF?.nome||'Usuário');
  const imgRe=/\[IMG:(https?:\/\/[^\]]+)\]/g;
  const imgs=[];let m2;
  while((m2=imgRe.exec(m.conteudo))!==null)imgs.push(m2[1]);
  const txt=m.conteudo.replace(/\[IMG:[^\]]+\]/g,'')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
  const ihtml=imgs.length?`<div class="msg-imgs">${imgs.map(u=>`<img src="${u}" alt="foto" onclick="openLB('${u}')" loading="lazy">`).join('')}</div>`:'';
  return`<div class="msg ${cls}">
    <div class="msg-meta">🕐 ${fdt(m.created_at)} &nbsp;&nbsp; 👤 ${who}</div>
    <div class="msg-txt">${txt}</div>${ihtml}
  </div>`;
}

        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="pc2" checked> Histórico de mensagens</label>

      </div>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>

async function sendMsg(cid){
  const inp=document.getElementById('replyin');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.focus();
  const{data:msg}=await sb.from('mensagens').insert({chamado_id:cid,autor_id:ME.id,autor_nome:PROF?.nome||ME.email,autor_email:ME.email,conteudo:txt}).select().single();
  if(msg){
    _MSGS.push(msg);
    const a=document.getElementById('msgsarea');
    if(a){a.innerHTML+=renderMsg(msg);a.scrollTop=a.scrollHeight;}
  }
}
async function sendImgMsg(cid,inp){
  const f=inp.files[0];if(!f)return;
  if(f.size>20*1024*1024){toast('Arquivo muito grande (máx. 20MB)','err');return;}
  toast('Enviando foto...','');
  const path=`ch${cid}/${Date.now()}_${f.name.replace(/[^a-z0-9.]/gi,'_')}`;
  const{data:up}=await sb.storage.from('anexos').upload(path,f,{upsert:true});
  if(up){
    const{data:u}=sb.storage.from('anexos').getPublicUrl(path);
    const{data:msg}=await sb.from('mensagens').insert({chamado_id:cid,autor_id:ME.id,autor_nome:PROF?.nome||ME.email,autor_email:ME.email,conteudo:`📎 Foto anexada\n[IMG:${u.publicUrl}]`}).select().single();
    if(msg){
      _MSGS.push(msg);
      const a=document.getElementById('msgsarea');
      if(a){a.innerHTML+=renderMsg(msg);a.scrollTop=a.scrollHeight;}
      toast('Foto enviada!','ok');
    }
  } else {toast('Erro ao enviar foto','err');}
  inp.value='';
}
async function updStatus(id,st){
  const{error}=await sb.from('chamados').update({status:st,updated_at:new Date().toISOString()}).eq('id',id);
  if(error)toast('Erro ao atualizar status','err');

async function criarUser(){
  const nome=document.getElementById('unome').value.trim();
  const email=document.getElementById('uemail').value.trim();
  const senha=document.getElementById('usenha').value.trim();
  const papel=document.getElementById('upapel').value;
  const loja_id=document.getElementById('uloja').value||null;
  if(!nome||!email||!senha){toast('⚠️ Preencha todos os campos!','err');return;}
  if(papel==='gerente'&&!loja_id){toast('⚠️ Selecione a loja do gerente!','err');return;}
  if(senha.length<6){toast('⚠️ Senha deve ter mínimo 6 caracteres!','err');return;}
  const btn=document.querySelector('#muser .btn-primary');
  btn.textContent='Criando...';btn.disabled=true;
  const{data,error}=await sb.auth.signUp({email,password:senha,options:{emailRedirectTo:null,data:{nome}}});
  btn.textContent='✅ Criar usuário';btn.disabled=false;
  if(error){toast('Erro: '+error.message,'err');return;}
  if(data.user){
    const{error:pe}=await sb.from('perfis').insert({id:data.user.id,nome,email,papel,loja_id:loja_id||null});
    if(pe){toast('Usuário criado mas erro no perfil: '+pe.message,'err');return;}
    // Confirmar email automaticamente
    await sb.rpc('confirm_user_email',{user_id:data.user.id}).catch(()=>{});
  }
  toast(`✅ ${nome} criado com sucesso! Senha: ${senha}`,'ok');
  closeModal();
  document.getElementById('unome').value='';
  document.getElementById('uemail').value='';
