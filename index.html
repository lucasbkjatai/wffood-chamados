<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e53935">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WF Food">
<link rel="manifest" id="pwa-manifest">
<title>WF Food — Sistema de Chamados</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
:root{
  --red:#e53935;--rd:#c62828;--rl:#ffebee;
  --sb:#1a1a1a;--bg:#f0f2f5;--wh:#fff;
  --br:#e0e0e0;--br2:#f0f0f0;
  --tx:#1a1a1a;--tx2:#757575;--tx3:#9e9e9e;
  --gn:#2e7d32;--gnb:#e8f5e9;--gnd:#c8e6c9;
  --bl:#1565c0;--blb:#e3f2fd;--bld:#bbdefb;
  --pu:#6a1b9a;--pub:#f3e5f5;
  --or:#e65100;--orb:#fff3e0;--ord:#ffe0b2;
  --ylb:#fffde7;
  --sh:0 1px 4px rgba(0,0,0,.08);
  --sh2:0 8px 24px rgba(0,0,0,.12);
}
body{background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}

/* ── LOGIN ── */
#ls{
  min-height:100vh;
  background:radial-gradient(ellipse at top,#2a0505 0%,#111 45%,#0a0a0a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;
}
.ll{text-align:center;margin-bottom:28px}
.ll img{
  height:70px;display:block;margin:0 auto 12px;
  
  filter:drop-shadow(0 2px 16px rgba(229,57,53,0.4));
}
.ll p{color:rgba(255,255,255,.3);font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:500}
.lc{
  background:rgba(15,15,15,.9);border:1px solid rgba(229,57,53,.25);
  border-radius:18px;padding:32px 36px;width:100%;max-width:400px;
  box-shadow:0 24px 64px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);
}
.lbl{display:flex;justify-content:space-between;align-items:center;color:rgba(255,255,255,.5);font-size:10px;font-weight:700;margin-bottom:7px;text-transform:uppercase;letter-spacing:.8px}
.lbl a{color:rgba(229,57,53,.8);font-size:11px;cursor:pointer;text-decoration:underline;text-transform:none;font-weight:400}
.li{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);font-size:14px;margin-bottom:16px;background:rgba(255,255,255,.06);color:#fff;outline:none;transition:all .2s}
.li:focus{border-color:rgba(229,57,53,.6);background:rgba(255,255,255,.09)}
.li::placeholder{color:rgba(255,255,255,.22)}
.lcr{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.lcr input{width:15px;height:15px;accent-color:var(--red);cursor:pointer}
.lcr span{color:rgba(255,255,255,.45);font-size:13px;cursor:pointer}
.lb{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.4px;transition:all .2s;box-shadow:0 6px 20px rgba(229,57,53,.35)}
.lb:hover{background:var(--rd);box-shadow:0 10px 28px rgba(229,57,53,.45);transform:translateY(-1px)}
.lb:disabled{opacity:.6;cursor:not-allowed;transform:none}
.le{background:rgba(229,57,53,.15);color:#ffcdd2;border:1px solid rgba(229,57,53,.3);padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;display:none}

/* ── LAYOUT ── */
#app{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:220px;min-width:220px;background:var(--sb);display:flex;flex-direction:column;transition:width .25s;flex-shrink:0}
.sidebar.col{width:58px;min-width:58px}
.sb-brand{padding:16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand img.sblogo{
  height:32px;width:auto;max-width:170px;display:block;
  filter:brightness(1.1);
}
.sidebar.col .sblogo{height:28px;max-width:28px;object-fit:cover;object-position:left}
.sb-sub{color:rgba(255,255,255,.2);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-top:6px;font-weight:600}
.sidebar.col .sb-sub{display:none}
.sb-nav{flex:1;padding:10px 0;overflow:hidden}
.ni{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;color:rgba(255,255,255,.42);font-size:13px;border-left:3px solid transparent;transition:all .15s;white-space:nowrap;overflow:hidden}
.ni:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
.ni.on{color:#fff;background:rgba(229,57,53,.13);border-left-color:var(--red)}
.ni-ico{font-size:18px;flex-shrink:0;width:22px;text-align:center}
.ni-lbl{overflow:hidden;text-overflow:ellipsis;font-weight:500}
.sidebar.col .ni-lbl,.sidebar.col .sb-sub{display:none}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sbf{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.22);font-size:11px;cursor:pointer;white-space:nowrap}
.sbf:hover{color:rgba(255,255,255,.5)}
.sidebar.col .sbf span:last-child{display:none}

/* ── TOPBAR ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:54px;padding:0 24px;background:var(--wh);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--sh)}
.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2)}
.bc a{color:var(--tx2);cursor:pointer;text-decoration:none;font-weight:500}
.bc a:hover{color:var(--tx);text-decoration:underline}
.bc-sep{color:var(--tx3)}
.tbr{display:flex;align-items:center;gap:14px;position:relative}
.tbc .tbc-l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.tbc .tbc-n{font-size:12px;font-weight:700}
.uav{width:36px;height:36px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:border-color .15s;user-select:none}
.uav:hover{border-color:rgba(229,57,53,.45)}
.dd{position:absolute;top:44px;right:0;background:var(--wh);border:1px solid var(--br);border-radius:12px;padding:6px 0;width:240px;z-index:300;box-shadow:var(--sh2);display:none}
.dd.open{display:block}
.dd-hd{padding:12px 16px 10px;border-bottom:1px solid var(--br2)}
.dd-nm{font-size:13px;font-weight:700;color:#1a1a1a}
.dd-em{font-size:11px;color:#757575;margin-top:2px}
.dd-it{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;transition:background .1s;font-weight:500;color:#1a1a1a!important}
.dd-it:hover{background:#f5f5f5}
.dd-sep{height:1px;background:var(--br2);margin:4px 0}
.dd-red{color:var(--red)!important}

/* ── PAGE ── */
.page{flex:1;overflow-y:auto;padding:24px}
.pg-t{font-size:20px;font-weight:800;margin-bottom:20px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:1px solid var(--br);background:var(--wh);cursor:pointer;font-size:13px;color:var(--tx);transition:all .15s;font-family:inherit;font-weight:600;white-space:nowrap}
.btn:hover{background:#f5f5f5;border-color:#ccc}
.btn-p{background:var(--red);color:#fff;border-color:var(--red)}
.btn-p:hover{background:var(--rd);border-color:var(--rd)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn:disabled{opacity:.6;cursor:not-allowed}
.fbtn{padding:5px 14px;border:1.5px solid var(--br);border-radius:100px;font-size:11px;background:var(--wh);cursor:pointer;font-family:inherit;font-weight:700;color:var(--tx2);transition:all .15s}
.fbtn:hover{border-color:var(--red);color:var(--red)}
.fbtn.on{background:var(--red);color:#fff;border-color:var(--red)}

/* ── CARD ── */
.card{background:var(--wh);border-radius:12px;border:1px solid var(--br);box-shadow:var(--sh)}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--br2);font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.card-bd{padding:16px 18px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;white-space:nowrap}
.bw{background:var(--gnb);color:var(--gn);border:1px solid var(--gnd)}
.ba{background:var(--blb);color:var(--bl);border:1px solid var(--bld)}
.bf{background:#f5f5f5;color:#666;border:1px solid #ddd}
.bl{background:#f9fbe7;color:#827717;border:1px solid #dce775}
.bm{background:var(--orb);color:var(--or);border:1px solid var(--ord)}
.bh{background:var(--rl);color:var(--rd);border:1px solid #ef9a9a}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dg{background:#43a047}.db{background:#1e88e5}.dgr{background:#9e9e9e}

/* ── HOME ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.stat{background:var(--wh);border-radius:12px;padding:20px;border:1px solid var(--br);box-shadow:var(--sh)}
.stat-n{font-size:36px;font-weight:900;line-height:1.1;margin-bottom:6px}
.stat-l{font-size:12px;color:var(--tx2);font-weight:500}
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.rec-it{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--br2)}
.rec-it:last-child{border:none}
.rec-lnk{font-size:12px;font-weight:700;cursor:pointer;color:var(--tx)}
.rec-lnk:hover{color:var(--red);text-decoration:underline}
.rec-dt{font-size:10px;color:var(--tx3);margin-top:2px}
.qbtn{width:100%;display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;border:1px solid var(--br);background:var(--wh);cursor:pointer;font-size:13px;font-weight:600;margin-bottom:8px;transition:all .15s;font-family:inherit}
.qbtn:hover{border-color:var(--red);background:var(--rl);color:var(--rd)}
.qbtn:last-child{margin-bottom:0}
.qdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── FORMULÁRIOS ── */
.cat-list{display:flex;flex-direction:column;gap:10px}
.cat-card{background:var(--wh);border:1px solid var(--br);border-radius:12px;padding:20px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:all .15s;box-shadow:var(--sh)}
.cat-card:hover{border-color:var(--red);box-shadow:0 4px 16px rgba(229,57,53,.12);transform:translateY(-1px)}
.cat-ico{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.ci-e{background:var(--blb);color:var(--bl)}
.ci-q{background:var(--gnb);color:var(--gn)}
.ci-t{background:var(--pub);color:var(--pu)}
.cat-name{font-size:15px;font-weight:700;margin-bottom:3px}
.cat-desc{font-size:12px;color:var(--tx2)}

/* ── FORM CHAMADO ── */
.fcard{background:var(--wh);border:1px solid var(--br);border-radius:12px;max-width:700px;box-shadow:var(--sh)}
.ftab-bar{background:#f8f8f8;padding:0 20px;border-bottom:1px solid var(--br);border-radius:12px 12px 0 0}
.ftab{display:inline-block;padding:12px 0;font-size:13px;font-weight:700;color:var(--red);border-bottom:3px solid var(--red)}
.fbd{padding:28px}
.fg{margin-bottom:22px}
.fl{display:block;font-size:11px;font-weight:700;margin-bottom:8px;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}
.fl .req{color:var(--red)}
.fh{font-size:11px;color:var(--tx3);margin-bottom:7px}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--br);border-radius:9px;font-size:13px;outline:none;font-family:inherit;background:#fafafa;color:var(--tx);transition:border-color .2s}
.fi:focus{border-color:var(--red);background:var(--wh)}
.fsel{padding:11px 14px;border:1.5px solid var(--br);border-radius:9px;font-size:13px;background:#fafafa;cursor:pointer;outline:none;font-family:inherit;transition:border-color .2s}
.fsel:focus{border-color:var(--red)}
.fta{width:100%;padding:11px 14px;border:1.5px solid var(--br);border-radius:9px;font-size:13px;resize:vertical;min-height:110px;outline:none;font-family:inherit;background:#fafafa;color:var(--tx);transition:border-color .2s}
.fta:focus{border-color:var(--red)}
.upz{border:2px dashed var(--br);border-radius:10px;padding:22px;text-align:center;background:#fafafa;transition:all .2s;cursor:pointer}
.upz:hover,.upz.drag{border-color:var(--red);background:var(--rl)}
.upz p{font-size:12px;color:var(--tx2);margin-bottom:10px}
.upz-btns{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap}
.fp{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.fp img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1.5px solid var(--br)}
.fp .fp-f{padding:6px 12px;background:#f5f5f5;border-radius:7px;font-size:11px;border:1px solid var(--br);color:var(--tx2)}
.ffoot{text-align:center;padding-top:8px;border-top:1px solid var(--br2)}
.sbox{text-align:center;padding:36px 20px}
.si{width:64px;height:64px;background:#43a047;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px;color:#fff}
.st{font-size:20px;font-weight:800;color:#1b5e20;margin-bottom:8px}
.ss{font-size:13px;color:#388e3c;margin-bottom:22px}
.sbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ── CHAMADOS TABLE ── */
.filter-row{margin-bottom:14px}
.filter-grp{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.filter-grp-lbl{font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-right:4px;flex-shrink:0}
.tw{background:var(--wh);border-radius:12px;border:1px solid var(--br);overflow:hidden;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f8f8f8;padding:10px 14px;text-align:left;font-weight:700;font-size:11px;color:var(--tx2);border-bottom:1px solid var(--br);white-space:nowrap;text-transform:uppercase;letter-spacing:.4px}
tbody td{padding:12px 14px;border-bottom:1px solid var(--br2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr.cr:hover td{background:#fafafa;cursor:pointer}
.tlink{color:var(--tx);font-weight:700;cursor:pointer}
.tlink:hover{color:var(--red);text-decoration:underline}
.tbl-empty{padding:56px;text-align:center;color:var(--tx2);font-size:13px}
.mob-cards{display:none;flex-direction:column;gap:8px}
.mob-card{background:var(--wh);border:1px solid var(--br);border-radius:10px;padding:14px;cursor:pointer;box-shadow:var(--sh)}
.mob-card:hover{border-color:var(--red)}

/* ── DETAIL ── */
.det-wrap{display:flex;height:100%;overflow:hidden}
.det-main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.det-hd{padding:12px 20px;background:var(--wh);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:10px;flex-shrink:0}
.det-title{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.det-body{flex:1;display:flex;overflow:hidden;min-height:0}
.det-tabs{width:155px;min-width:155px;border-right:1px solid var(--br);background:#fafafa;padding:10px 8px;flex-shrink:0}
.dt-it{padding:9px 10px;border-radius:7px;font-size:12px;cursor:pointer;color:var(--tx2);display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;transition:background .1s;font-weight:500}
.dt-it:hover{background:#f0f0f0}
.dt-it.act{background:var(--wh);color:var(--tx);font-weight:700;box-shadow:var(--sh)}
.dt-cnt{background:var(--red);color:#fff;font-size:10px;padding:2px 7px;border-radius:100px}
.msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
.msg{border-radius:10px;padding:14px 16px}
.msg-f{background:var(--gnb);border:1px solid var(--gnd)}
.msg-a{background:var(--ylb);border:1px solid #fff176}
.msg-u{background:var(--wh);border:1px solid var(--br);box-shadow:var(--sh)}
.msg-m{font-size:11px;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.msg-t{font-size:13px;line-height:1.65;color:var(--tx)}
.msg-imgs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.msg-imgs img{height:100px;max-width:160px;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid var(--br);transition:opacity .15s}
.msg-imgs img:hover{opacity:.85}
.reply-bar{padding:12px 20px;background:var(--wh);border-top:1px solid var(--br);display:flex;gap:8px;align-items:center;flex-shrink:0}
.reply-in{flex:1;padding:10px 14px;border:1.5px solid var(--br);border-radius:9px;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
.reply-in:focus{border-color:var(--red)}
.det-side{width:265px;min-width:265px;border-left:1px solid var(--br);overflow-y:auto;background:var(--wh);flex-shrink:0}
.ds-s{padding:14px 16px;border-bottom:1px solid var(--br2)}
.ds-t{font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.ds-r{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--br2);gap:8px}
.ds-r:last-child{border:none}
.ds-l{font-size:11px;color:var(--tx2);flex-shrink:0}
.ds-v{font-size:11px;font-weight:600;text-align:right;word-break:break-word}
.actor-r{display:flex;align-items:center;gap:10px;margin-top:8px}
.actor-av{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}

/* ── STATS TAB ── */
.tl{padding:16px 20px;overflow-y:auto}
.tl-it{display:flex;align-items:flex-start;gap:12px;padding:8px 0;position:relative}
.tl-dot{width:26px;height:26px;min-width:26px;border-radius:50%;border:2px solid var(--br);background:var(--wh);display:flex;align-items:center;justify-content:center;font-size:11px}
.tl-dot.done{background:#43a047;border-color:#43a047;color:#fff}
.tl-dot.now{background:var(--bl);border-color:var(--bl);color:#fff}
.tl-lbl{font-size:13px;font-weight:600}
.tl-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.stat-nums{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.snum{background:#f8f8f8;border-radius:8px;padding:12px;border:1px solid var(--br)}
.snum-v{font-size:20px;font-weight:800}
.snum-l{font-size:11px;color:var(--tx2);margin-top:3px}

/* ── ADMIN ── */
.adm-card{background:var(--wh);border:1px solid var(--br);border-radius:12px;overflow:hidden;box-shadow:var(--sh);margin-bottom:16px}
.adm-hd{padding:14px 20px;border-bottom:1px solid var(--br2);display:flex;align-items:center;justify-content:space-between}
.adm-title{font-size:14px;font-weight:700}
.adm-body{padding:0 20px}
.usr-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--br2)}
.usr-row:last-child{border:none}
.usr-info{flex:1;min-width:0}
.usr-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.usr-email{font-size:11px;color:var(--tx2)}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.mbg.open{display:flex}
.modal{background:var(--wh);border-radius:16px;padding:28px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.15)}
.modal-t{font-size:17px;font-weight:800;margin-bottom:22px}
.modal-f{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--br2)}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transition:all .3s;opacity:0;transform:translateY(8px);pointer-events:none;max-width:340px}
#toast.show{opacity:1;transform:translateY(0)}
#toast.err{background:#c62828}
#toast.ok{background:#2e7d32}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;padding:64px;color:var(--tx2);font-size:13px;gap:10px}
.spin{width:22px;height:22px;border:2px solid var(--br);border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── LIGHTBOX ── */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:2000;cursor:pointer;padding:20px}
.lb.open{display:flex}
.lb img{max-width:90%;max-height:90%;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lb-x{position:absolute;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer}

/* ── MOBILE HEADER ── */
.mob-hd{display:none;height:56px;background:var(--sb);align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:400;flex-shrink:0}
.mob-hd img{height:26px;filter:brightness(1.1)}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--sb);border-top:1px solid rgba(255,255,255,.1);z-index:500;flex-direction:row;align-items:stretch}
.mn-it{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:rgba(255,255,255,.4);font-size:10px;font-weight:600;padding:4px 0}
.mn-it.on{color:#fff}
.mn-it span:first-child{font-size:20px;line-height:1}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .hgrid{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
  .det-side{display:none}
}
@media(max-width:640px){
  #app{height:auto;min-height:100vh}
  .layout{flex-direction:column;height:auto}
  .sidebar{display:none!important}
  .topbar{display:none}
  .page{padding:16px;padding-bottom:80px}
  .mob-hd{display:flex}
  .mob-nav{display:flex}
  .stats{grid-template-columns:1fr 1fr}
  .stat-n{font-size:28px}
  .hgrid{grid-template-columns:1fr;gap:12px}
  .cat-card{padding:14px}
  .fcard{max-width:100%}
  .fbd{padding:16px}
  .tw table{display:none}
  .mob-cards{display:flex!important}
  .det-wrap{flex-direction:column}
  .det-tabs{width:100%;min-width:100%;border-right:none;border-bottom:1px solid var(--br);padding:6px 12px;flex-direction:row;display:flex;gap:4px;overflow-x:auto;flex-shrink:0}
  .det-body{flex-direction:column}
  .dt-it{white-space:nowrap;padding:7px 12px;font-size:11px}
  .msgs{padding:10px 14px}
  .reply-bar{padding:8px 12px;gap:6px}
  .reply-in{font-size:13px}
  .modal{margin:10px;padding:20px}
}
@media print{
  .sidebar,.topbar,.reply-bar,.det-tabs,.det-side,.mbg,#toast,.lb,.mob-nav,.mob-hd,.btn-p{display:none!important}
  .det-wrap{display:block}
  .det-main,.msgs{height:auto;overflow:visible}
  body,.page{background:#fff;padding:0}
  .card,.tw,.fcard{box-shadow:none}
}
</style>
</head>

/* AUTH */
async function doLogin(){
  const email=document.getElementById('lemail').value.trim();
  const pass=document.getElementById('lpass').value;
  const btn=document.getElementById('lbtn');
  document.getElementById('lerr').style.display='none';
  if(!email||!pass){setErr('Preencha e-mail e senha.');return;}
  btn.textContent='Entrando...';btn.disabled=true;
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  btn.textContent='Entrar';btn.disabled=false;
  if(error){setErr(error.message.includes('Invalid')?'E-mail ou senha incorretos.':error.message);return;}
  await boot(data.user);
}
function setErr(m){const e=document.getElementById('lerr');e.textContent=m;e.style.display='block';}
async function doForgot(){
  const em=document.getElementById('lemail').value.trim();
  if(!em){alert('Digite seu e-mail primeiro.');return;}
  await sb.auth.resetPasswordForEmail(em,{redirectTo:'https://wffood-chamados.vercel.app'});
  alert('Link enviado para '+em);
}
async function boot(user){
  ME=user;
  let p=null;
  for(let i=0;i<3;i++){
    const{data:pd}=await sb.from('perfis').select('*').eq('id',user.id).single();
    if(pd){p=pd;break;}
    await new Promise(r=>setTimeout(r,500));
  }
  PROF=p;
  const{data:l}=await sb.from('lojas').select('*').order('codigo');
  LOJAS=l||[];
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='block';
  const nome=p?.nome||user.email||'U';
  const ini=nome.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  ['uav','uav-mob'].forEach(id=>{const el=document.getElementById(id);if(el)el.childNodes[0].textContent=ini;});
  ['ddnm','ddnm-mob'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=p?.nome||user.email;});
  ['ddem','ddem-mob'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=user.email;});
  document.getElementById('tbc-n').textContent=p?.papel==='gestor'?'Gestor — Todas as lojas':(LOJAS.find(x=>x.id===p?.loja_id)?.nome||'WFFOOD');
  if(p?.papel==='gestor'){
    document.getElementById('ni-admin').style.display='flex';
    document.getElementById('mni-admin').style.display='flex';
  }
  goPage('home');
}
async function doLogout(){
  await sb.auth.signOut();ME=null;PROF=null;
  document.getElementById('app').style.display='none';
  document.getElementById('ls').style.display='flex';
  document.getElementById('lpass').value='';
  document.getElementById('ni-admin').style.display='none';
  document.getElementById('mni-admin').style.display='none';
  closeDD();
}

/* NAV */
function goPage(page,params={}){
  closeDD();
  document.querySelectorAll('.ni,.mn-it').forEach(n=>n.classList.remove('on'));
  const nm={home:'ni-home',forms:'ni-forms',chamados:'ni-chamados',novo:'ni-forms',detail:'ni-chamados',admin:'ni-admin'};
  const mm={home:'mni-home',forms:'mni-forms',chamados:'mni-chamados',novo:'mni-forms',detail:'mni-chamados',admin:'mni-admin'};
  [nm[page],mm[page]].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('on');});
  const pg=document.getElementById('pg'),bc=document.getElementById('bc');
  pg.style.cssText='flex:1;overflow-y:auto;padding:24px';
  if(page==='home'){bc.innerHTML=`🏠 <a onclick="goPage('home')">Home</a>`;renderHome(pg);}
  else if(page==='forms'){bc.innerHTML=`🏠 <a onclick="goPage('home')">Home</a> <span class="bc-sep">›</span> Formulários`;renderForms(pg);}
  else if(page==='novo'){bc.innerHTML=`🏠 <a onclick="goPage('home')">Home</a> <span class="bc-sep">›</span> <a onclick="goPage('forms')">Formulários</a> <span class="bc-sep">›</span> ${catLbl(params.cat)}`;renderFormChamado(pg,params.cat);}
  else if(page==='chamados'){bc.innerHTML=`🏠 <a onclick="goPage('home')">Home</a> <span class="bc-sep">›</span> Chamados`;renderChamados(pg);}
  else if(page==='detail'){bc.innerHTML=`🏠 <a onclick="goPage('home')">Home</a> <span class="bc-sep">›</span> <a onclick="goPage('chamados')">Chamados</a> <span class="bc-sep">›</span> #${params.id}`;renderDetail(pg,params.id);}
  else if(page==='admin'){bc.innerHTML=`🏠 <a onclick="goPage('home')">Home</a> <span class="bc-sep">›</span> Usuários`;renderAdmin(pg);}
}

/* HELPERS */
function catLbl(c){return c==='estrutural'?'Manutenção Estrutural':c==='equipamentos'?'Manutenção Equipamentos':'Manutenção TI (Informática)';}
function lojaStr(id){const l=LOJAS.find(x=>x.id===id);return l?l.codigo+' — '+l.nome:'—';}
function fdt(d){if(!d)return'—';const dt=new Date(d);return dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function sbadge(s){
  if(s==='aguardando')return'<span class="badge bw"><span class="dot dg"></span> Aguardando atendimento</span>';
  if(s==='em_atendimento')return'<span class="badge ba"><span class="dot db"></span> Em atendimento</span>';
  return'<span class="badge bf"><span class="dot dgr"></span> Fechado</span>';
}
function pbadge(p){
  if(p==='alta')return'<span class="badge bh">Alta</span>';
  if(p==='media')return'<span class="badge bm">Média</span>';
  return'<span class="badge bl">Baixa</span>';
}
function prazoCell(ch){
  if(ch.status==='fechado')return'<span style="font-size:11px;color:var(--gn);font-weight:600">✅ Resolvido</span>';
  const prazoH=ch.prioridade==='alta'?24:ch.prioridade==='media'?48:72;
  const diff=new Date(ch.created_at).getTime()+prazoH*3600000-Date.now();
  const h=Math.floor(Math.abs(diff)/3600000);
  if(diff<0)return'<span style="font-size:11px;font-weight:700;color:var(--rd);background:var(--rl);padding:2px 8px;border-radius:6px">⚠️ +'+h+'h atrasado</span>';
  if(h<8)return'<span style="font-size:11px;font-weight:700;color:var(--or);background:var(--orb);padding:2px 8px;border-radius:6px">🔴 '+h+'h restantes</span>';
  if(h<24)return'<span style="font-size:11px;color:var(--or);font-weight:600">🟡 '+h+'h</span>';
  return'<span style="font-size:11px;color:var(--tx2)">🟢 '+Math.floor(h/24)+'d restantes</span>';
}
function toast(m,t=''){const el=document.getElementById('toast');el.textContent=m;el.className='show'+(t?' '+t:'');setTimeout(()=>el.className='',3500);}
function toggleDD(){

function closeDD(){

/* HOME */
async function renderHome(pg){
  pg.innerHTML='<div class="loading"><div class="spin"></div> Carregando...</div>';
  let q=sb.from('chamados').select('*').order('created_at',{ascending:false});
  if(PROF?.papel==='gerente')q=q.eq('loja_id',PROF.loja_id);

function onFiles(inp){
  _dropped=null;
  const names=Array.from(inp.files).map(f=>f.name).join(', ');
  const el=document.getElementById('ffname');if(el)el.textContent=names||'Nenhum arquivo';
  const prev=document.getElementById('fprev');if(prev)prev.innerHTML='';
  Array.from(inp.files).forEach(f=>{
    if(f.type.startsWith('image/')){const r=new FileReader();r.onload=e=>{if(prev)prev.innerHTML+=`<img src="${e.target.result}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1.5px solid var(--br)">`;}; r.readAsDataURL(f);}
    else if(prev)prev.innerHTML+=`<div class="fp-f">📄 ${f.name}</div>`;
  });
}
function handleDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag');
  _dropped=e.dataTransfer.files;
  const names=Array.from(_dropped).map(f=>f.name).join(', ');
  const el=document.getElementById('ffname');if(el)el.textContent=names;
  const prev=document.getElementById('fprev');if(prev)prev.innerHTML='';
  Array.from(_dropped).forEach(f=>{
    if(f.type.startsWith('image/')){const r=new FileReader();r.onload=e2=>{if(prev)prev.innerHTML+=`<img src="${e2.target.result}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1.5px solid var(--br)">`;}; r.readAsDataURL(f);}
  });
}
async function submitChamado(cat){
  const loja_id=document.getElementById('floja').value;
  const titulo=document.getElementById('ftitulo')?.value.trim();
  const desc=document.getElementById('fdesc').value.trim();
  const tel=document.getElementById('ftel').value.trim();
  const prio=document.getElementById('fprio').value;
  if(!loja_id){toast('⚠️ Selecione a loja!','err');return;}
  if(!titulo){toast('⚠️ Informe o título do chamado!','err');return;}
  if(!desc){toast('⚠️ Descreva o problema!','err');return;}
  if(!tel){toast('⚠️ Informe o telefone!','err');return;}
  const btn=document.getElementById('fsubmit');btn.textContent='Enviando...';btn.disabled=true;
  const loja=LOJAS.find(l=>l.id===loja_id);
  const{data:ch,error}=await sb.from('chamados').insert({titulo,descricao:desc,categoria:cat,prioridade:prio,loja_id,criado_por:ME.id}).select().single();
  if(error){toast('Erro: '+error.message,'err');btn.textContent='✉️ Enviar chamado';btn.disabled=false;return;}
  const files=Array.from(_dropped||document.getElementById('ffile').files||[]);
  const urls=[];
  for(const f of files){
    if(f.size>20*1024*1024){toast('⚠️ '+f.name+' muito grande (máx 20MB)','err');continue;}
    const path=`ch${ch.id}/${Date.now()}_${f.name.replace(/[^a-z0-9.]/gi,'_')}`;
    const{data:up}=await sb.storage.from('anexos').upload(path,f,{upsert:true});
    if(up){const{data:u}=sb.storage.from('anexos').getPublicUrl(path);urls.push(u.publicUrl);}
  }
  const imgTxt=urls.map(u=>`\n[IMG:${u}]`).join('');
  await sb.from('mensagens').insert({chamado_id:ch.id,autor_id:ME.id,autor_nome:PROF?.nome||ME.email,autor_email:ME.email,
    conteudo:`📋 *Dados do formulário*\n\n**Loja:** ${loja?.codigo} — ${loja?.nome}\n**Categoria:** ${catLbl(cat)}\n**Título:** ${titulo}\n**Descrição:** ${desc}\n**Prioridade:** ${prio} (SLA: ${prio==='alta'?'24h':prio==='media'?'48h':'72h'})\n**Telefone:** ${tel}${imgTxt}`});
  await sb.from('mensagens').insert({chamado_id:ch.id,autor_id:null,autor_nome:'Sistema WFFOOD',autor_email:null,
    conteudo:`✅ *Chamado #${ch.id} registrado com sucesso!*\n\nOlá ${PROF?.nome||''}! Recebemos sua solicitação.\n\n⏱ **Prazo de atendimento:** ${prio==='alta'?'24 horas':prio==='media'?'48 horas':'72 horas'}\n\n📌 **Dica:** Quanto mais fotos e detalhes, mais rápida será a solução.\n\n📞 **Urgência:** Entre em contato informando o nº do chamado: #${ch.id}`});
  document.getElementById('fbd').innerHTML=`
    <div class="sbox">
      <div class="si">✅</div>
      <div class="st">Chamado #${ch.id} aberto!</div>
      <div class="ss">Prazo: ${prio==='alta'?'24h':prio==='media'?'48h':'72h'} · Em breve um técnico iniciará o atendimento.</div>
      <div class="sbtns">
        <button class="btn btn-p" onclick="goPage('detail',{id:${ch.id}})">👁 Acompanhar</button>
        <button class="btn" onclick="goPage('chamados')">📋 Todos os chamados</button>
        <button class="btn" onclick="goPage('forms')">➕ Novo chamado</button>
      </div>
    </div>`;
}

    <input type="text" class="reply-in" id="replyin" placeholder="Escreva uma mensagem..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){sendMsg(${cid});event.preventDefault()}" />
    <label class="btn btn-sm" for="replyfile" title="Anexar foto" style="cursor:pointer">📎</label>
    <input type="file" id="replyfile" accept="image/*" style="display:none" onchange="sendImgMsg(${cid},this)" />
    <button class="btn btn-p btn-sm" onclick="sendMsg(${cid})">✉️ Enviar</button>
  </div>`;
}
function renderMsg(m){
  const isForm=m.conteudo.startsWith('📋');
  const isAuto=m.conteudo.startsWith('✅');
  const cls=isForm?'msg-f':isAuto?'msg-a':'msg-u';
  const who=isAuto?'🤖 Sistema automático':(m.autor_nome||(m.autor_email?m.autor_email.split('@')[0]:null)||PROF?.nome||'Usuário');
  const imgRe=/\[IMG:(https?:\/\/[^\]]+)\]/g;
  const imgs=[];let mx;
  while((mx=imgRe.exec(m.conteudo))!==null)imgs.push(mx[1]);
  const txt=m.conteudo.replace(/\[IMG:[^\]]+\]/g,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
  const ihtml=imgs.length?'<div class="msg-imgs">'+imgs.map(u=>'<img src="'+u+'" alt="foto" onclick="openLB(\''+u+'\')" loading="lazy">').join('')+'</div>':'';
  return`<div class="msg ${cls}"><div class="msg-m">🕐 ${fdt(m.created_at)} &nbsp; 👤 ${who}</div><div class="msg-t">${txt}</div>${ihtml}</div>`;
}

async function sendMsg(cid){
  const inp=document.getElementById('replyin');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.focus();
  const{data:msg}=await sb.from('mensagens').insert({chamado_id:cid,autor_id:ME.id,autor_nome:PROF?.nome||ME.email,autor_email:ME.email,conteudo:txt}).select().single();
  if(msg){_MSGS.push(msg);const a=document.getElementById('msgsarea');if(a){a.innerHTML+=renderMsg(msg);a.scrollTop=a.scrollHeight;}}
}
async function sendImgMsg(cid,inp){
  const f=inp.files[0];if(!f)return;
  if(f.size>20*1024*1024){toast('Arquivo muito grande (máx 20MB)','err');return;}
  toast('Enviando foto...','');
  const path=`ch${cid}/${Date.now()}_${f.name.replace(/[^a-z0-9.]/gi,'_')}`;
  const{data:up}=await sb.storage.from('anexos').upload(path,f,{upsert:true});
  if(up){
    const{data:u}=sb.storage.from('anexos').getPublicUrl(path);
    const{data:msg}=await sb.from('mensagens').insert({chamado_id:cid,autor_id:ME.id,autor_nome:PROF?.nome||ME.email,autor_email:ME.email,conteudo:`📎 Foto anexada\n[IMG:${u.publicUrl}]`}).select().single();
    if(msg){_MSGS.push(msg);const a=document.getElementById('msgsarea');if(a){a.innerHTML+=renderMsg(msg);a.scrollTop=a.scrollHeight;}toast('Foto enviada!','ok');}
  } else toast('Erro ao enviar foto','err');
  inp.value='';
}
async function updStatus(id,st){
  const{error}=await sb.from('chamados').update({status:st,updated_at:new Date().toISOString()}).eq('id',id);
  if(error)toast('Erro ao atualizar status','err');
  else{
    if(_CDATA)_CDATA.status=st;
    if(window._CHS){const ch=window._CHS.find(x=>x.id===id);if(ch)ch.status=st;}
    toast('Status: '+st,'ok');
    const dot=document.querySelector('.det-hd div:first-child');
    if(dot)dot.style.background=st==='aguardando'?'#43a047':st==='em_atendimento'?'#1e88e5':'#9e9e9e';
  }
}
function printTicket(cid){
  if(!_CDATA)return;
  const loja=LOJAS.find(l=>l.id===_CDATA.loja_id);
  const inclMsgs=document.getElementById('pc2')?.checked!==false;
  const inclFotos=document.getElementById('pc3')?.checked===true;
  let msgsHtml='';
  if(inclMsgs){
    msgsHtml=_MSGS.map(m=>{
      const isAuto=m.conteudo.startsWith('✅');
      const who=isAuto?'Sistema automático':(m.autor_nome||m.autor_email||'Usuário');
      const imgRe=/\[IMG:(https?:\/\/[^\]]+)\]/g;
      const imgs=[];let mx;
      while((mx=imgRe.exec(m.conteudo))!==null)imgs.push(mx[1]);
      const txt=m.conteudo.replace(/\[IMG:[^\]]+\]/g,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
      const bg=m.conteudo.startsWith('📋')?'#e8f5e9':isAuto?'#fffde7':'#fff';
      const imgHtml=inclFotos&&imgs.length?'<div>'+imgs.map(u=>'<img src="'+u+'" style="max-width:200px;max-height:150px;border-radius:6px;margin:4px;border:1px solid #ddd">').join('')+'</div>':'';
      return'<div style="background:'+bg+';border:1px solid #ddd;border-radius:8px;padding:12px;margin-bottom:8px"><div style="font-size:11px;color:#757575;margin-bottom:6px">'+new Date(m.created_at).toLocaleString('pt-BR')+' · '+who+'</div><div>'+txt+'</div>'+imgHtml+'</div>';
    }).join('');
  }
  const win=window.open('','_blank','width=820,height=900');
  win.document.write(`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Chamado #${_CDATA.id}</title><style>body{font-family:Arial,sans-serif;padding:32px;color:#1a1a1a;font-size:13px;line-height:1.5}h1{font-size:20px;font-weight:800;margin-bottom:4px}.s{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#757575;margin:18px 0 8px;border-bottom:1px solid #e0e0e0;padding-bottom:5px}.row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f5f5f5}.lbl{color:#757575;font-size:11px}.val{font-weight:600;text-align:right}@media print{body{padding:16px}}</style></head><body>
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #e53935">
    <div style="background:#e53935;color:#fff;width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px">W</div>
    <div><div style="font-size:10px;color:#757575;text-transform:uppercase;letter-spacing:.5px">WF Food — Sistema de Chamados</div><h1>${_CDATA.titulo} (#${_CDATA.id})</h1></div>
  </div>
  <div class="s">Informações</div>
  <div class="row"><span class="lbl">Entidade</span><span class="val">${loja?loja.codigo+' — '+loja.nome:'—'}</span></div>
  <div class="row"><span class="lbl">Abertura</span><span class="val">${fdt(_CDATA.created_at)}</span></div>
  <div class="row"><span class="lbl">Categoria</span><span class="val">${catLbl(_CDATA.categoria)}</span></div>
  <div class="row"><span class="lbl">Prioridade</span><span class="val">${_CDATA.prioridade}</span></div>
  <div class="row"><span class="lbl">Status</span><span class="val">${_CDATA.status==='aguardando'?'Aguardando':_CDATA.status==='em_atendimento'?'Em atendimento':'Fechado'}</span></div>
  ${inclMsgs?'<div class="s">Histórico de Mensagens</div>'+msgsHtml:''}
  <div style="margin-top:24px;font-size:10px;color:#9e9e9e;border-top:1px solid #e0e0e0;padding-top:8px">Impresso em ${new Date().toLocaleString('pt-BR')} — WF Food Sistema de Chamados</div>
  </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(),500);
}

function openModal(){document.getElementById('muser').classList.add('open');}
function closeModal(){document.getElementById('muser').classList.remove('open');}
function toggleLojaFg(){document.getElementById('ulojafg').style.display=document.getElementById('upapel').value==='gerente'?'block':'none';}
async function criarUser(){
  const nome=document.getElementById('unome').value.trim();
  const email=document.getElementById('uemail').value.trim();
  const senha=document.getElementById('usenha').value.trim();
  const papel=document.getElementById('upapel').value;
  const loja_id=document.getElementById('uloja').value||null;
  if(!nome||!email||!senha){toast('⚠️ Preencha todos os campos!','err');return;}
  if(papel==='gerente'&&!loja_id){toast('⚠️ Selecione a loja!','err');return;}
  if(senha.length<6){toast('⚠️ Senha mínimo 6 caracteres!','err');return;}
  const btn=document.querySelector('#muser .btn-p');btn.textContent='Criando...';btn.disabled=true;
  const{data,error}=await sb.auth.signUp({email,password:senha,options:{emailRedirectTo:null,data:{nome}}});
  btn.textContent='✅ Criar usuário';btn.disabled=false;
  if(error){toast('Erro: '+error.message,'err');return;}
  if(data.user){
    const{error:pe}=await sb.from('perfis').insert({id:data.user.id,nome,email,papel,loja_id:loja_id||null});
    if(pe){toast('Erro no perfil: '+pe.message,'err');return;}
  }
  toast('✅ '+nome+' criado! Senha: '+senha,'ok');
  closeModal();
  ['unome','uemail','usenha'].forEach(id=>document.getElementById(id).value='');
  setTimeout(()=>renderAdmin(document.getElementById('pg')),600);
}
async function delUser(uid,nome){
  if(!confirm('Excluir o usuário '+nome+'?\n\nEsta ação remove o acesso ao sistema.\nNão pode ser desfeita.'))return;
  const{error,count}=await sb.from('perfis').delete({count:'exact'}).eq('id',uid);
  if(error){
    toast('Erro ao excluir: '+error.message,'err');
    console.error('Delete error:',error);
    return;
  }
  // Verificar se realmente deletou
  const{data:check}=await sb.from('perfis').select('id').eq('id',uid).single();
  if(check){
    toast('⚠️ Não foi possível excluir. Verifique as permissões no banco.','err');
    return;
  }
  toast('✅ '+nome+' excluído com sucesso!','ok');
  const row=document.getElementById('usr-'+uid);
  if(row){row.style.transition='all .3s';row.style.opacity='0';row.style.height='0';setTimeout(()=>row.remove(),300);}
  const t=document.querySelector('.adm-title');
  if(t){const m=t.textContent.match(/\d+/);if(m)t.textContent='Usuários cadastrados ('+(parseInt(m[0])-1)+')';}
}

/* REMOVE BLACK BG FROM LOGOS */
function removeBlackBg(img) {
  try {
    if (!img.naturalWidth) return;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);
    const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const px = d.data;
    for (let i = 0; i < px.length; i += 4) {
      if (px[i] < 45 && px[i+1] < 45 && px[i+2] < 45) {
        px[i+3] = 0;
      }
    }
    ctx.putImageData(d, 0, 0);
    img.src = canvas.toDataURL('image/png');
  } catch(e) {}
}
function processLogos() {
  document.querySelectorAll('.ll img, .sblogo, .mob-hd img').forEach(img => {
    if (img.complete && img.naturalWidth > 0) {
      removeBlackBg(img);
    } else {
      img.onload = () => removeBlackBg(img);
    }
  });
}
window.addEventListener('load', processLogos);
